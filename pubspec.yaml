name: movie_app
description: Aplikasi Movie - UAS Pemrograman Mobile
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

# Konfigurasi native splash screen (logo yang muncul PALING AWAL,
# sebelum Flutter selesai load, menggantikan logo Flutter bawaan).
# Cara pakai:
#   1. flutter pub get
#   2. flutter pub run flutter_native_splash:create
# Untuk ganti logo: timpa file assets/images/logo.png dengan gambar kamu,
# lalu ulangi command nomor 2 di atas.
flutter_native_splash:
  color: "#0F0F1B"
  image: assets/images/logo.png
  android_12:
    color: "#0F0F1B"
    image: assets/images/logo.png
